<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talent Pipeline - Administrar Entrevistas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background: #f8fafc;
        }
        
        .card {
            background: white;
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
            transition: all 0.2s;
        }
        
        .card:hover {
            box-shadow: 0 8px 16px rgba(85, 59, 196, 0.1);
            border-color: #553BC4;
        }
        
        .pregunta-item {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 0.75rem;
            cursor: move;
            transition: all 0.2s;
        }
        
        .pregunta-item:hover {
            border-color: #553BC4;
            background: #f0edfe;
        }
        
        .badge-categoria {
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            display: inline-block;
        }
        
        .badge-tecnica { background: #dbeafe; color: #1e40af; }
        .badge-blanda { background: #dcfce7; color: #166534; }
        .badge-experiencia { background: #fef9c3; color: #854d0e; }
        .badge-motivacional { background: #f3e8ff; color: #6b21a8; }
        .badge-general { background: #e2e8f0; color: #475569; }
        
        .btn-primary {
            background: #553BC4;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-primary:hover {
            background: #3f2b9c;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(85, 59, 196, 0.3);
        }
        
        .btn-secondary {
            background: white;
            color: #1e293b;
            border: 1px solid #e2e8f0;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-secondary:hover {
            background: #f8fafc;
            border-color: #553BC4;
            color: #553BC4;
        }
        
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 2rem;
        }
        
        .modal-content {
            background: white;
            border-radius: 24px;
            max-width: 800px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            padding: 2rem;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.2);
        }
        
        .modal-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: #f1f5f9;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #475569;
            transition: all 0.2s;
        }
        
        .modal-close:hover {
            background: #e2e8f0;
            transform: rotate(90deg);
        }
        
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: #94a3b8;
            border: 2px dashed #e2e8f0;
            border-radius: 12px;
        }
    </style>
</head>
<body class="p-8">
    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-4xl font-bold text-gray-800 mb-2">📋 Administrar Entrevistas</h1>
                <p class="text-lg text-gray-600">Configure las plantillas de preguntas para sus entrevistas por video</p>
            </div>
            <div class="flex gap-3">
                <button onclick="location.href='/'" class="btn-secondary">
                    ← Volver al dashboard
                </button>
                <button onclick="mostrarNuevaPlantilla()" class="btn-primary">
                    + Nueva plantilla
                </button>
            </div>
        </div>

        <!-- Lista de plantillas -->
        <div id="plantillas-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-8">
            <!-- Se cargará dinámicamente -->
            <div class="col-span-3 text-center py-12 text-gray-500">
                Cargando plantillas...
            </div>
        </div>

        <!-- Modal para crear/editar plantilla -->
        <div id="modalPlantilla" class="modal" style="display: none;">
            <div class="modal-content">
                <button class="modal-close" onclick="cerrarModal()">✕</button>
                <h2 class="text-2xl font-bold mb-6" id="modalTitulo">Nueva Plantilla</h2>
                
                <form id="formPlantilla" onsubmit="event.preventDefault(); guardarPlantilla();">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Nombre de la plantilla *</label>
                            <input type="text" id="nombrePlantilla" class="w-full border rounded-lg p-2" required 
                                   placeholder="Ej: Entrevista técnica">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Puesto asociado</label>
                            <input type="text" id="puestoPlantilla" class="w-full border rounded-lg p-2" 
                                   placeholder="Ej: Desarrollador .NET">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Tipo</label>
                            <select id="tipoPlantilla" class="w-full border rounded-lg p-2">
                                <option value="generica">Genérica (conocer al candidato)</option>
                                <option value="especifica">Específica para puesto</option>
                            </select>
                        </div>
                    </div>

                    <h3 class="font-semibold text-lg mb-3 flex items-center gap-2">
                        <span class="bg-[#553BC4] text-white w-6 h-6 rounded-full flex items-center justify-center text-sm">📝</span>
                        Preguntas de la entrevista
                    </h3>
                    
                    <div id="listaPreguntas" class="space-y-2 mb-4">
                        <!-- Las preguntas se agregan aquí -->
                    </div>

                    <button type="button" onclick="agregarPregunta()" class="btn-secondary w-full mb-6">
                        + Agregar pregunta
                    </button>

                    <div class="flex justify-end gap-3 pt-4 border-t">
                        <button type="button" onclick="cerrarModal()" class="btn-secondary">Cancelar</button>
                        <button type="submit" class="btn-primary">Guardar plantilla</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        let preguntasTemp = [];
        let plantillaEditId = null;

        // Cargar plantillas al iniciar
        $(document).ready(function() {
            cargarPlantillas();
        });

        async function cargarPlantillas() {
            try {
                const res = await fetch('/api/admin/plantillas');
                const data = await res.json();
                
                if (data.success) {
                    const container = document.getElementById('plantillas-container');
                    
                    if (data.plantillas.length === 0) {
                        container.innerHTML = `
                            <div class="col-span-3">
                                <div class="empty-state">
                                    <div class="text-4xl mb-3">📭</div>
                                    <h3 class="text-xl font-semibold text-gray-700 mb-2">No hay plantillas</h3>
                                    <p class="text-gray-500 mb-4">Comience creando su primera plantilla de entrevista</p>
                                    <button onclick="mostrarNuevaPlantilla()" class="btn-primary">+ Crear plantilla</button>
                                </div>
                            </div>
                        `;
                        return;
                    }
                    
                    let html = '';
                    data.plantillas.forEach(p => {
                        html += `
                            <div class="card">
                                <div class="flex justify-between items-start mb-3">
                                    <span class="px-2 py-1 text-xs rounded-full ${p.tipo === 'generica' ? 'bg-blue-100 text-blue-800' : 'bg-purple-100 text-purple-800'}">
                                        ${p.tipo === 'generica' ? '📋 Genérica' : '🎯 Específica'}
                                    </span>
                                    <span class="text-xs text-gray-500">${new Date(p.fecha_creacion).toLocaleDateString()}</span>
                                </div>
                                <h3 class="text-xl font-semibold mb-1">${p.nombre}</h3>
                                ${p.puesto ? `<p class="text-[#553BC4] text-sm mb-3">${p.puesto}</p>` : ''}
                                <div class="flex justify-end gap-2 mt-4">
                                    <button onclick="verPlantilla(${p.id})" class="text-sm text-[#553BC4] hover:underline">Ver</button>
                                    <button onclick="editarPlantilla(${p.id})" class="text-sm text-gray-600 hover:text-[#553BC4]">Editar</button>
                                </div>
                            </div>
                        `;
                    });
                    container.innerHTML = html;
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }

        function mostrarNuevaPlantilla() {
            plantillaEditId = null;
            preguntasTemp = [];
            document.getElementById('modalTitulo').textContent = 'Nueva Plantilla';
            document.getElementById('nombrePlantilla').value = '';
            document.getElementById('puestoPlantilla').value = '';
            document.getElementById('tipoPlantilla').value = 'generica';
            actualizarListaPreguntas();
            document.getElementById('modalPlantilla').style.display = 'flex';
        }

        function editarPlantilla(id) {
            // Por ahora solo creamos nuevas
            mostrarNuevaPlantilla();
        }

        async function verPlantilla(id) {
            try {
                const res = await fetch(`/api/admin/plantilla/${id}`);
                const data = await res.json();
                
                if (data.success) {
                    alert(`Plantilla: ${data.plantilla.nombre}\nPreguntas: ${data.plantilla.preguntas.length}`);
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }

        function agregarPregunta() {
            preguntasTemp.push({
                id: Date.now(),
                pregunta: '',
                categoria: 'general',
                tiempo_maximo: 120
            });
            actualizarListaPreguntas();
        }

        function eliminarPregunta(index) {
            preguntasTemp.splice(index, 1);
            actualizarListaPreguntas();
        }

        function actualizarListaPreguntas() {
            const container = document.getElementById('listaPreguntas');
            container.innerHTML = '';
            
            preguntasTemp.forEach((p, index) => {
                const div = document.createElement('div');
                div.className = 'pregunta-item';
                div.innerHTML = `
                    <div class="flex items-start gap-3">
                        <span class="text-gray-400 cursor-move mt-2">☰</span>
                        <div class="flex-1">
                            <input type="text" value="${p.pregunta.replace(/"/g, '&quot;')}" 
                                   placeholder="Escriba la pregunta..." 
                                   onchange="actualizarPregunta(${index}, this.value)"
                                   class="w-full border-0 bg-transparent focus:ring-0 mb-2 font-medium">
                            <div class="flex flex-wrap gap-2">
                                <select onchange="actualizarCategoria(${index}, this.value)" 
                                        class="text-sm border rounded px-2 py-1">
                                    <option value="general" ${p.categoria === 'general' ? 'selected' : ''}>General</option>
                                    <option value="tecnica" ${p.categoria === 'tecnica' ? 'selected' : ''}>Técnica</option>
                                    <option value="blanda" ${p.categoria === 'blanda' ? 'selected' : ''}>Blanda</option>
                                    <option value="experiencia" ${p.categoria === 'experiencia' ? 'selected' : ''}>Experiencia</option>
                                    <option value="motivacional" ${p.categoria === 'motivacional' ? 'selected' : ''}>Motivacional</option>
                                </select>
                                <input type="number" value="${p.tiempo_maximo}" 
                                       placeholder="Tiempo máx (seg)" 
                                       onchange="actualizarTiempo(${index}, this.value)"
                                       class="text-sm border rounded px-2 py-1 w-24">
                                <span class="text-xs text-gray-500 py-1">seg</span>
                            </div>
                        </div>
                        <button onclick="eliminarPregunta(${index})" class="text-red-500 hover:text-red-700 mt-2">✕</button>
                    </div>
                `;
                container.appendChild(div);
            });

            if (preguntasTemp.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-6 text-gray-500 border-2 border-dashed rounded-lg">
                        No hay preguntas agregadas. Haga clic en "Agregar pregunta" para comenzar.
                    </div>
                `;
            }
        }

        function actualizarPregunta(index, valor) {
            preguntasTemp[index].pregunta = valor;
        }

        function actualizarCategoria(index, valor) {
            preguntasTemp[index].categoria = valor;
        }

        function actualizarTiempo(index, valor) {
            preguntasTemp[index].tiempo_maximo = parseInt(valor) || 120;
        }

        async function guardarPlantilla() {
            const nombre = document.getElementById('nombrePlantilla').value;
            if (!nombre) {
                alert('El nombre de la plantilla es obligatorio');
                return;
            }

            // Filtrar preguntas vacías
            const preguntasValidas = preguntasTemp.filter(p => p.pregunta.trim() !== '');
            
            if (preguntasValidas.length === 0) {
                alert('Debe agregar al menos una pregunta');
                return;
            }

            const plantilla = {
                nombre: nombre,
                puesto: document.getElementById('puestoPlantilla').value,
                tipo: document.getElementById('tipoPlantilla').value,
                preguntas: preguntasValidas
            };

            try {
                const res = await fetch('/api/admin/plantilla', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(plantilla)
                });
                
                const data = await res.json();
                
                if (data.success) {
                    cerrarModal();
                    cargarPlantillas();
                    alert('✅ Plantilla guardada exitosamente');
                } else {
                    alert('Error: ' + data.error);
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Error al guardar la plantilla');
            }
        }

        function cerrarModal() {
            document.getElementById('modalPlantilla').style.display = 'none';
            preguntasTemp = [];
        }
    </script>
</body>
</html>
