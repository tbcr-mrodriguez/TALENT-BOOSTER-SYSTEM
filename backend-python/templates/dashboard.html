<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Talent Pipeline</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <div class="min-h-screen flex items-center justify-center">
        <div class="text-center">
            <div class="bg-white rounded-2xl shadow-xl p-8 max-w-md">
                <div class="text-6xl mb-4">🎯</div>
                <h1 class="text-2xl font-bold text-gray-800 mb-2">¡Bienvenido!</h1>
                <p class="text-gray-600 mb-4">Has iniciado sesión correctamente</p>
                <button onclick="cerrarSesion()" class="bg-red-500 text-white px-4 py-2 rounded-lg hover:bg-red-600 transition">
                    Cerrar sesión
                </button>
            </div>
        </div>
    </div>
    <script>
        function cerrarSesion() {
            localStorage.removeItem('auth_token');
            localStorage.removeItem('user');
            window.location.href = '/login.html';
        }
    </script>
</body>
</html>
