services:
  # Backend Flask API
  - type: web
    name: talent-booster-api
    runtime: python
    rootDir: backend-python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: talent-booster-db
          property: connectionString
      # 🔥 AGREGA ESTAS DOS LÍNEAS 🔥
      - key: ALLOWED_ORIGINS
        value: https://talent-booster-frontend.onrender.com
      - key: FRONTEND_URL
        value: https://talent-booster-frontend.onrender.com
      # El resto sigue igual
      - key: AZURE_TENANT_ID
        sync: false
      - key: AZURE_CLIENT_ID
        sync: false
      - key: AZURE_CLIENT_SECRET
        sync: false
      - key: SENDER_EMAIL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: WEB_CONCURRENCY
        value: 1

  # Frontend React
  - type: web
    name: talent-booster-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_URL
        value: https://talent-booster-api.onrender.com/api

databases:
  - name: talent-booster-db
    plan: free